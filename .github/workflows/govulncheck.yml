name: govulncheck
on:
  pull_request:
  schedule: # Mondays at 05:08 UTC
    - cron: '08 05 * * 1'
  workflow_dispatch:
permissions:
  contents: read
jobs:
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      
      - run: |
          go run golang.org/x/vuln/cmd/govulncheck@latest ./...
